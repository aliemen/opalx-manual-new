name: Build documentation preview

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  QUARTO_PROFILE: opalx

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out manual
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Validate manual source
        run: ruby scripts/validate_manual.rb

      - name: Check out documents
        uses: actions/checkout@v4
        with:
          repository: OPALX-project/opalx-documents
          lfs: true
          path: _external/opalx-documents

      - name: Validate document links
        env:
          DOCUMENTS_CHECKOUT: _external/opalx-documents
        run: ruby scripts/validate_manual.rb

      - name: Render HTML
        run: quarto render --profile "${QUARTO_PROFILE}" --to html

      - name: Render unnumbered report archive
        run: quarto render resources/reports --profile "${QUARTO_PROFILE}" --to html

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install headless Chrome for PDF diagrams
        run: quarto install chrome-headless-shell --no-prompt

      - name: Render A4 PDF
        run: quarto render --profile "${QUARTO_PROFILE}" --to pdf --no-clean

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils

      - name: Validate rendered links and profile URLs
        run: ruby scripts/validate_rendered_html.rb

      - name: Validate rendered PDF hierarchy
        run: ruby scripts/validate_rendered_pdf.rb

      - name: Upload HTML and PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opalx-documentation-${{ env.QUARTO_PROFILE }}
          path: _site
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
