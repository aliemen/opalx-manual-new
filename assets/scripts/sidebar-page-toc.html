      items: [

        { id: "marker", text: "MARKER" },

        {
          id: "element-limitations",
          text: "Current limitations"
        },
        { id: "opal-element-input-format", text: "OPAL element input format", variant: "opal" },
        { id: "opal-common-attributes-for-all-elements", text: "Common OPAL attributes", variant: "opal" },
        { id: "opal-drift-spaces", text: "Drift spaces", variant: "opal" },
        { id: "opal-quadrupole", text: "Quadrupole", variant: "opal" },
        { id: "opal-sextupole", text: "Sextupole", variant: "opal" },
        { id: "opal-octupole", text: "Octupole", variant: "opal" },
        { id: "opal-general-multipole", text: "General multipole", variant: "opal" },
        { id: "opal-general-multipole-with-fringe-field-model", text: "Multipole with fringe fields", variant: "opal" },
        { id: "opal-solenoid", text: "Solenoid", variant: "opal" },
        { id: "opal-rf-cavities", text: "RF cavities", variant: "opal" },
        { id: "opal-traveling-wave-structure", text: "Traveling-wave structure", variant: "opal" },
        { id: "opal-monitor", text: "Monitor", variant: "opal" },
        { id: "opal-collimators", text: "Collimators", variant: "opal" },
        { id: "opal-correctors", text: "Correctors", variant: "opal" },
        { id: "opal-bending-magnets", text: "Bending magnets", variant: "opal" },
        { id: "opal-variable-rf-cavities", text: "Variable RF cavities", variant: "opal" },
        { id: "opal-septum", text: "Septum", variant: "opal" },
        { id: "opal-probe", text: "Probe", variant: "opal" },
        { id: "opal-output-plane", text: "Output plane", variant: "opal" },
        { id: "opal-stripper", text: "Stripper", variant: "opal" },
        { id: "opal-degrader", text: "Degrader", variant: "opal" },
        { id: "opal-vacuum", text: "Vacuum", variant: "opal" },
        { id: "opal-undulator", text: "Undulator", variant: "opal" }
      ]
    }
  ];

  const linkPath = (link) => {
    try {
      return new URL(link.href, window.location.href).pathname;
    } catch (_) {
      return "";
    }
  };

  const chapterLink = (chapter) => Array.from(
    document.querySelectorAll("#quarto-sidebar a.sidebar-link[href]")
  ).find((link) => linkPath(link).endsWith(chapter.path));

  const numberItems = (items) => items.map((item, index) => ({
    ...item,
    numberSuffix: String(index + 1),
    children: item.children?.map((child, childIndex) => ({
      ...child,
      numberSuffix: `${index + 1}.${childIndex + 1}`
    }))
  }));

  const renderedNumber = (item, chapterNumber) => {
    const section = document.getElementById(item.id);
    const number = section?.querySelector(
      ":scope > h2 .header-section-number, :scope > h3 .header-section-number"
    )?.textContent.trim();
    return number || (chapterNumber ? `${chapterNumber}.${item.numberSuffix}` : "");
  };

  const numberedText = (chapterNumber, item) => {
    const fragment = document.createDocumentFragment();
    const rendered = renderedNumber(item, chapterNumber);
    if (rendered) {
      const number = document.createElement("span");
      number.className = "chapter-number";
      number.textContent = rendered;
      fragment.append(number, document.createTextNode("\u00a0 "));
    }
    const title = document.createElement("span");
    title.className = "chapter-title";
    title.textContent = item.text;
    fragment.append(title);
    return fragment;
  };

  const sectionLink = (baseHref, chapterNumber, item, depth, inheritedVariant) => {
    const li = document.createElement("li");
    li.className = "sidebar-item opalx-page-toc-item";
    li.dataset.opalxTocAnchor = item.id;
    const variant = item.variant || inheritedVariant;
    if (variant) li.dataset.opalDocumentationVariant = variant;

    const container = document.createElement("div");
    container.className = "sidebar-item-container";

    const link = document.createElement("a");
    link.className = "sidebar-item-text sidebar-link";
    link.href = `${baseHref}#${item.id}`;
    link.dataset.opalxTocDepth = String(depth);
    const menuText = document.createElement("span");
    menuText.className = "menu-text";
    menuText.append(numberedText(chapterNumber, item));
    link.append(menuText);
    container.append(link);
    li.append(container);

    if (item.children) {
      li.classList.add("sidebar-item-section");
      const targetId = `opalx-sidebar-${item.id}`;
      const toggle = document.createElement("button");
      toggle.type = "button";
      toggle.className = "sidebar-item-toggle text-start collapsed opalx-page-toc-toggle";
      toggle.dataset.bsToggle = "collapse";
      toggle.dataset.bsTarget = `#${targetId}`;
      toggle.setAttribute("aria-controls", targetId);
      toggle.setAttribute("aria-expanded", "false");
      toggle.setAttribute("aria-label", item.toggleLabel || `Toggle ${item.text} subsections`);
      const icon = document.createElement("i");
      icon.className = "bi bi-chevron-right ms-2";
      toggle.append(icon);
      container.append(toggle);

      const children = document.createElement("ul");
      children.id = targetId;
      children.className = "collapse list-unstyled sidebar-section depth3 opalx-page-toc-children";
      children.dataset.opalxStateKey = item.stateKey;
      item.children.forEach((child) => {
        children.append(sectionLink(baseHref, chapterNumber, child, depth + 1, variant));
      });
      li.append(children);
    }

    return li;
  };

  const markActiveAnchor = (chapter, toc) => {
    toc.querySelectorAll("a.sidebar-link.active").forEach((link) => link.classList.remove("active"));
    if (!window.location.pathname.endsWith(chapter.path) || !window.location.hash) return;
    const id = window.location.hash.slice(1);
    toc.querySelector(`[data-opalx-toc-anchor="${CSS.escape(id)}"] > div a`)?.classList.add("active");
  };

  const initializeChapter = (chapter) => {
    const link = chapterLink(chapter);
    if (!link || document.getElementById(chapter.targetId)) return;

    const host = link.closest("li.sidebar-item");
    const container = link.closest(".sidebar-item-container");
    if (!host || !container) return;

    host.classList.add("sidebar-item-section", "opalx-page-toc-host");
    const toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "sidebar-item-toggle text-start collapsed opalx-page-toc-toggle";
    toggle.dataset.bsToggle = "collapse";
    toggle.dataset.bsTarget = `#${chapter.targetId}`;
    toggle.setAttribute("aria-controls", chapter.targetId);
    toggle.setAttribute("aria-expanded", "false");
    toggle.setAttribute("aria-label", chapter.toggleLabel);
    const icon = document.createElement("i");
    icon.className = "bi bi-chevron-right ms-2";
    toggle.append(icon);
    container.append(toggle);

    const toc = document.createElement("ul");
    toc.id = chapter.targetId;
    toc.className = "collapse list-unstyled sidebar-section depth2 opalx-page-toc";
    toc.dataset.opalxStateKey = chapter.stateKey;
    const baseHref = link.getAttribute("href").split("#", 1)[0];
    const chapterNumber = link.querySelector(".chapter-number")?.textContent.trim() || "";
    numberItems(chapter.items).forEach((item) => {
      toc.append(sectionLink(baseHref, chapterNumber, item, 2, chapter.defaultVariant));
    });
    host.append(toc);
    markActiveAnchor(chapter, toc);
    window.addEventListener("hashchange", () => markActiveAnchor(chapter, toc));
  };

  const initialize = () => {
    chapters.forEach(initializeChapter);
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initialize, { once: true });
  } else {
    initialize();
  }
})();
</script>
