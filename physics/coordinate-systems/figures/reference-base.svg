<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="250" viewBox="0 0 1100 250">
  <style>
    .panel-blue { fill: #eef5ff; stroke: #78a7e3; stroke-width: 2; }
    .panel-green { fill: #eef8ee; stroke: #76a66e; stroke-width: 2; }
    .panel-orange { fill: #fff4e9; stroke: #d08a34; stroke-width: 2; }
    .beamline { stroke: #222; stroke-width: 4; fill: none; }
    .nodebox { fill: #ececec; stroke: #777; stroke-width: 1.5; rx: 6; ry: 6; }
    .label { font: 700 24px sans-serif; fill: #111; }
    .small { font: 22px sans-serif; fill: #111; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <rect x="12" y="24" width="325" height="172" rx="10" ry="10" class="panel-blue"/>
  <text x="34" y="58" class="label">(a)</text>
  <line x1="58" y1="116" x2="280" y2="116" class="beamline"/>
  <rect x="82" y="100" width="42" height="30" class="nodebox"/>
  <rect x="156" y="100" width="42" height="30" class="nodebox"/>
  <rect x="230" y="100" width="42" height="30" class="nodebox"/>
  <text x="103" y="115" class="small">D</text>
  <text x="177" y="115" class="small">B</text>
  <text x="251" y="115" class="small">D</text>

  <rect x="387" y="24" width="325" height="172" rx="10" ry="10" class="panel-green"/>
  <text x="409" y="58" class="label">(b)</text>
  <circle cx="550" cy="112" r="56" class="beamline"/>
  <rect x="529" y="38" width="42" height="28" class="nodebox"/>
  <rect x="602" y="98" width="42" height="28" class="nodebox"/>
  <rect x="529" y="158" width="42" height="28" class="nodebox"/>
  <rect x="456" y="98" width="42" height="28" class="nodebox"/>
  <text x="550" y="52" class="small">D</text>
  <text x="623" y="112" class="small">B</text>
  <text x="550" y="172" class="small">D</text>
  <text x="477" y="112" class="small">B</text>

  <rect x="762" y="24" width="325" height="172" rx="10" ry="10" class="panel-orange"/>
  <text x="784" y="58" class="label">(c)</text>
  <line x1="808" y1="116" x2="1030" y2="116" class="beamline"/>
  <line x1="914" y1="116" x2="994" y2="56" class="beamline"/>
  <circle cx="914" cy="116" r="6" fill="#fff" stroke="#222" stroke-width="2"/>
  <rect x="832" y="100" width="42" height="30" class="nodebox"/>
  <rect x="948" y="82" width="42" height="30" class="nodebox"/>
  <rect x="988" y="44" width="42" height="30" class="nodebox"/>
  <text x="853" y="115" class="small">D</text>
